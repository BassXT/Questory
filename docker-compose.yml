services:
  db:
    image: postgres:17-alpine
    container_name: questory-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-questory}
      POSTGRES_USER: ${POSTGRES_USER:-questory}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-questory_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-questory} -d ${POSTGRES_DB:-questory}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: questory-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://questory:questory_dev_password@db:5432/questory?schema=public}
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
      PORT: ${BACKEND_PORT:-3000}
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: questory-frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3000/api}
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      - backend

volumes:
  postgres-data:
