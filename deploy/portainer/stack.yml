services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-questory}
      POSTGRES_USER: ${POSTGRES_USER:-questory}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-questory_dev_password}
    volumes:
      - questory-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-questory} -d ${POSTGRES_DB:-questory}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../..
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-questory}:${POSTGRES_PASSWORD:-questory_dev_password}@db:5432/${POSTGRES_DB:-questory}?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
      PORT: 3000
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ../..
      dockerfile: apps/frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3000/api}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      - backend

volumes:
  questory-postgres-data:
